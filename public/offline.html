<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PokloniMi — van mreže</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fffaf8;
      color: #2d3436;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #f0e4de;
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    .emoji { font-size: 56px; }
    h1 { font-size: 22px; margin: 16px 0 8px; }
    p { font-size: 15px; line-height: 1.6; color: #636e72; margin: 0 0 20px; }
    button {
      border: 0;
      background: #ff6b6b;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 999px;
      cursor: pointer;
    }
    button:hover { background: #ee5a5a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji" aria-hidden="true">📡</div>
    <h1>Trenutno ste van mreže</h1>
    <p>
      Za pregled i rezervaciju poklona potrebna je internet veza.
      Proverite mrežu i pokušajte ponovo.
      <br /><br />
      <span lang="en">You're offline. An internet connection is needed to view and reserve gifts.</span>
    </p>
    <button onclick="location.reload()">Pokušaj ponovo / Retry</button>
  </div>
</body>
</html>
